<!DOCTYPE html>

<html>
<head>

{% load static %}

<link rel="stylesheet" href="{% static 'css/login.css' %}">
<title>Forgot Password</title>

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="login-card text-center">

<!-- LOGO -->
<img src="{% static 'images/logo.png' %}" class="logo-img">

<h3 class="mb-1">Forgot Password</h3>
<p class="text-muted small-text">Reset your password securely</p>

<!-- MESSAGES -->
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-info">{{ message }}</div>
    {% endfor %}
{% endif %}

<form method="POST">
    {% csrf_token %}

    <!-- USERNAME -->
    <div class="mb-3 text-start">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username or email" required>
    </div>

    <!-- SEND OTP BUTTON -->
    <button name="send_otp" class="btn btn-warning w-100 mb-3">
        Send OTP
    </button>

    <!-- OTP -->
    <div class="mb-3 text-start">
        <label class="form-label">OTP</label>
        <input type="text" name="otp" class="form-control" placeholder="Enter OTP">
    </div>

    <!-- NEW PASSWORD -->
    <div class="mb-3 text-start">
        <label class="form-label">New Password</label>
        <input type="password" name="new_password" class="form-control" placeholder="Enter new password">
    </div>

    <!-- RESET BUTTON -->
    <button name="reset_password" class="btn btn-primary w-100">
        Reset Password
    </button>

</form>

<!-- BACK TO LOGIN -->
<p class="mt-3 small-text">
    Remember your password?
    <a href="{% url 'login' %}" class="text-decoration-none">Login</a>
</p>


</div>

</body>
</html>
