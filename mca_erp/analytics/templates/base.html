<!DOCTYPE html>
<html>

<head>
    <title>MCA ERP Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body{
            background:#f1f5f9;
        }

        /* 🔥 SIDEBAR (STICKY) */
        .sidebar{
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 16.66%;
            background:#0f172a;
            color:white;
            padding-top:20px;
            overflow-y:auto;
        }

        .sidebar h4{
            font-weight:bold;
        }

        .sidebar a{
            display:block;
            color:white;
            padding:12px;
            margin:5px 10px;
            text-decoration:none;
            border-radius:8px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#1e293b;
        }

        /* 🔥 CONTENT AREA */
        .content-area{
            margin-left:16.66%;
            padding:20px;
        }

        /* 🔥 TOPBAR */
        .topbar{
            background:white;
            padding:12px 20px;
            box-shadow:0px 2px 8px rgba(0,0,0,0.08);
            border-radius:10px;
            margin-bottom:15px;
        }

        /* 🔥 CARD EFFECT */
        .card{
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        /* 🔥 SCROLLBAR */
        .sidebar::-webkit-scrollbar {
            width: 5px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }

    </style>

</head>

<body>

<!-- 🔥 SIDEBAR -->
<div class="sidebar">

    <h4 class="text-center">⚙️ MCA ERP</h4>
    <hr>

    <a href="/admin-dashboard/">📊 Dashboard</a>
    <a href="/students/">👨‍🎓 Students</a>
    <a href="/add-marks/">📝 Marks</a>
    <a href="#">📄 Reports</a>
    <a href="/mark-attendance/">📅 Mark Attendance</a>
    <a href="/attendance-history/">📊 Attendance History</a>
    <a href="/results/">📑 Results</a>
    <a href="/logout/">🚪 Logout</a>

</div>

<!-- 🔥 MAIN CONTENT -->
<div class="content-area">

    <!-- <div class="topbar d-flex justify-content-between align-items-center">
        <h5 class="mb-0">📊 Teacher Dashboard</h5>
        <span class="text-muted">Welcome {{request.user.username}}</span>
    </div> -->

    {% block content %}
    {% endblock %}

</div>

<!-- 🔥 ALERT -->
{% if messages %}
<script>
{% for message in messages %}
Swal.fire({
    icon: "{{ message.tags }}",
    title: "{{ message }}",
    confirmButtonColor: "#2563eb"
})
{% endfor %}
</script>
{% endif %}

</body>
</html>
