<!DOCTYPE html>
<html>
<head>
<title>Student Signup</title>

{% load static %}

<!-- External CSS -->
<link rel="stylesheet" href="{% static 'css/signup.css' %}">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>
<div class="signup-card text-center">

    <img src="{% static 'images/logo.png' %}" class="logo-img">

    <h3 class="mb-1">Student Registration</h3>
    <p class="text-muted small-text">Create your account</p>

    <form method="POST">
        {% csrf_token %}

        <div class="row">

            <!-- LEFT COLUMN -->
            <div class="col-md-6 text-start">
                <div class="mb-3">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Roll No</label>
                    <input type="text" name="roll_no" class="form-control" required>
                </div>
            </div>

            <!-- RIGHT COLUMN -->
            <div class="col-md-6 text-start">
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Phone</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Semester</label>
                    <input type="text" name="semester" class="form-control" required>
                </div>
            </div>

        </div>

        <button class="btn btn-success w-100 mt-3">Register</button>

        <p class="mt-3 small-text">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>

    </form>

</div>

</body>
</html>
