<!DOCTYPE html>
<html>

<head>
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f1f5f9;
        }

        .sidebar{
            height:100vh;
            background:#1e293b;
            color:white;
            padding-top:20px;
            position:fixed;
            width:16.66%;
        }

        .sidebar a{
            display:block;
            color:white;
            padding:12px;
            text-decoration:none;
            border-radius:8px;
            margin:5px 10px;
        }

        .sidebar a:hover{
            background:#334155;
        }

        .content-area{
            margin-left:16.66%;
        }

        .card{
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }
    </style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- 🔥 SIDEBAR -->
<div class="col-md-2 sidebar">

    <h4 class="text-center">🎓 Student</h4>
    <hr>

    <a href="{% url 'student_dashboard' %}">🏠 Dashboard</a>
    <a href="{% url 'student_attendance' %}">📊 Attendance</a>
    <a href="{% url 'student_marks' %}">📝 Marks</a>
    <a href="{% url 'student_results' %}">📄 Results</a>
    <a href="/logout/">🚪 Logout</a>

</div>

<!-- 🔥 CONTENT -->
<div class="col-md-10 p-4 content-area">

    {% block content %}
    {% endblock %}

</div>

</div>

</div>

</body>
</html>
