{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/login.css' %}">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body style="font-family: 'Poppins', sans-serif; background: #f5f7fa;">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4 text-center" style="width: 400px; border-radius: 15px;">

        <!-- LOGO -->
        <img src="{% static 'images/logo.png' %}" alt="Logo" style="width: 80px; margin: auto;">

        <h3 class="mt-3">ERP Login</h3>
        <p class="text-muted small">Welcome back! Please login to continue.</p>

        <!-- FORM -->
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <!-- USERNAME -->
            <div class="mb-3 text-start">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>

            <!-- PASSWORD -->
            <div class="mb-3 text-start">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>

            <!-- ROLE -->
            <div class="mb-3 text-start">
                <label class="form-label">Login As</label>
                <select name="role" class="form-select">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <!-- REMEMBER + FORGOT -->
            <div class="d-flex justify-content-between small mb-3">
                <div>
                    <input type="checkbox" name="remember"> Remember me
                </div>
                <a href="{% url 'forgot_password' %}" class="text-decoration-none">Forgot Password?</a>
            </div>

            <!-- BUTTON -->
            <button type="submit" class="btn btn-primary w-100">Sign In</button>

        </form>

        <p class="mt-3 text-muted small">
            Secure login powered by ERP System
        </p>

    </div>

</div>

</body>
</html>
